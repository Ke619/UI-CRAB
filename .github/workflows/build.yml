name: Build AppImage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev pkg-config libfuse2

      - name: Compile
        run: |
          gcc headcrab_updater.c -o AppDir/usr/bin/headcrab_updater \
            $(pkg-config --cflags --libs gtk+-3.0)
          chmod +x AppDir/usr/bin/headcrab_updater
          chmod +x AppDir/AppRun
          cp headcrab_blue.png AppDir/usr/bin/headcrab_blue.png

      - name: Download appimagetool
        run: |
          curl -Lo appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool AppDir HeadcrabUpdater-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeadcrabUpdater
          path: HeadcrabUpdater-x86_64.AppImage
